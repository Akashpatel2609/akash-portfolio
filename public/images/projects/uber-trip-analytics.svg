<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Uber Trip Analytics dashboard visualization</title>
  <desc id="desc">A dark Power BI-style dashboard showing trip demand, vehicle utilization, revenue opportunities, and peak windows.</desc>
  <defs><linearGradient id="g" x1="0" x2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient></defs>
  <rect width="1600" height="1000" fill="#050505"/>
  <path d="M0 125h1600M0 305h1600M0 485h1600M0 665h1600M0 845h1600M200 0v1000M500 0v1000M800 0v1000M1100 0v1000M1400 0v1000" stroke="#fff" stroke-opacity=".045"/>
  <rect x="90" y="90" width="1420" height="820" rx="36" fill="#101010" stroke="#fff" stroke-opacity=".12"/>
  <text x="140" y="165" fill="#fff" font-family="Inter,Arial" font-size="44" font-weight="700">Uber Trip Analytics</text>
  <text x="140" y="212" fill="#a1a1aa" font-family="Inter,Arial" font-size="22">Star schema model for demand windows, vehicle utilization, and revenue opportunity</text>
  <rect x="140" y="285" width="610" height="260" rx="26" fill="#0a0a0a" stroke="#fff" stroke-opacity=".12"/>
  <rect x="790" y="285" width="620" height="260" rx="26" fill="#0a0a0a" stroke="#fff" stroke-opacity=".12"/>
  <rect x="140" y="600" width="1270" height="220" rx="26" fill="#0a0a0a" stroke="#fff" stroke-opacity=".12"/>
  <g fill="url(#g)" opacity=".9"><rect x="200" y="470" width="38" height="40" rx="6"/><rect x="260" y="430" width="38" height="80" rx="6"/><rect x="320" y="380" width="38" height="130" rx="6"/><rect x="380" y="335" width="38" height="175" rx="6"/><rect x="440" y="365" width="38" height="145" rx="6"/><rect x="500" y="405" width="38" height="105" rx="6"/><rect x="560" y="350" width="38" height="160" rx="6"/><rect x="620" y="315" width="38" height="195" rx="6"/></g>
  <text x="190" y="340" fill="#fff" font-family="Inter,Arial" font-size="24" font-weight="700">Demand by hour</text>
  <circle cx="985" cy="415" r="95" fill="none" stroke="#fff" stroke-opacity=".12" stroke-width="28"/><path d="M985 320a95 95 0 0 1 82 143" fill="none" stroke="url(#g)" stroke-width="28" stroke-linecap="round"/>
  <text x="945" y="425" fill="#fff" font-family="Inter,Arial" font-size="34" font-weight="700">72%</text><text x="1125" y="410" fill="#a1a1aa" font-family="Inter,Arial" font-size="22">utilization during peak windows</text>
  <path d="M220 745 C360 665 480 720 610 660 C760 590 930 700 1080 635 C1190 590 1300 620 1340 585" fill="none" stroke="url(#g)" stroke-width="6"/>
  <g fill="#fff" opacity=".65"><circle cx="220" cy="745" r="8"/><circle cx="610" cy="660" r="8"/><circle cx="1080" cy="635" r="8"/><circle cx="1340" cy="585" r="8"/></g>
</svg>
